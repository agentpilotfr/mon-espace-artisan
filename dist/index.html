<script type="text/babel">
// ─── ATOMS ───────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback, useMemo } = React;

function useScrollY() {
  const [y, setY] = useState(0);
  useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => { setY(window.scrollY); raf = 0; });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return y;
}

function useInView(threshold = 0.2) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => setInView(e.isIntersecting), { threshold });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [threshold]);
  return [ref, inView];
}

function Sticker({ children, color = 'var(--mea-orange)', rotate = -4, style }) {
  return (
    <span className="mono" style={{
      display: 'inline-block', background: color, color: 'var(--mea-dark)',
      padding: '0.25rem 0.6rem', fontSize: '0.7rem', letterSpacing: '0.1em',
      textTransform: 'uppercase', border: '1.5px solid var(--mea-dark)',
      transform: `rotate(${rotate}deg)`, ...style,
    }}>
      {children}
    </span>
  );
}

function SectionLabel({ number, title, kicker }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: '1rem', marginBottom: '2.5rem', flexWrap: 'wrap' }}>
      <div className="mono uppercase" style={{ fontSize: '0.72rem', color: 'var(--mea-orange-deep)' }}>/ {number}</div>
      <div style={{ height: 1, flex: '0 0 40px', background: 'var(--mea-dark)' }} />
      <h2 className="display" style={{ fontSize: 'clamp(2rem, 5vw, 3.8rem)', lineHeight: 0.95, flex: 1 }}>{title}</h2>
      {kicker && <div className="mono uppercase" style={{ fontSize: '0.72rem', color: 'var(--mea-gray)', maxWidth: 260, textAlign: 'right' }}>{kicker}</div>}
    </div>
  );
}

function HammerSVG({ size = 64, color = 'var(--mea-dark)', handle = 'var(--mea-orange)' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" fill="none">
      <rect x="58" y="45" width="8" height="60" rx="1" fill={handle} stroke={color} strokeWidth="2" transform="rotate(30 62 75)" />
      <path d="M25 22 L75 22 L85 32 L85 44 L75 54 L25 54 L15 44 L15 32 Z" fill={color} />
      <rect x="55" y="22" width="14" height="32" fill={color} />
      <path d="M25 22 L75 22 L85 32 L75 32 L25 32 Z" fill="rgba(255,255,255,0.14)" />
    </svg>
  );
}

function BCard({ children, bg = 'var(--mea-white)', accent, style, ...rest }) {
  return (
    <div style={{ background: bg, border: '1.5px solid var(--mea-dark)',
      boxShadow: accent ? '6px 6px 0 0 var(--mea-orange)' : '6px 6px 0 0 var(--mea-dark)', ...style }} {...rest}>
      {children}
    </div>
  );
}

// ─── NAVBAR ──────────────────────────────────────────────────────────────────
function Navbar() {

  const scrolled = y > 80;
  const [menuOpen, setMenuOpen] = useState(false);
  const [navHidden, setNavHidden] = useState(false);
  const lastYRef = useRef(0);
  useEffect(function() {
    console.log('NAVBAR MOUNTED - scroll listener attached');
    function onScroll() {
      var y = window.scrollY || window.pageYOffset;
      console.log('SCROLL Y:', y, 'lastY:', lastYRef.current, 'navHidden will be:', y > lastYRef.current && y > 60);
      if (y < 60) {
        setNavHidden(false);
      } else if (y > lastYRef.current) {
        setNavHidden(true);
      } else {
        setNavHidden(false);
      }

        <div style={{ display: 'flex', alignItems: 'center', gap: '0.85rem' }}>
          <a href="tel:+33629817069" className="mono uppercase nav-phone" style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', fontSize: '0.7rem', color: 'var(--mea-dark)', letterSpacing: '0.1em' }}>
            📞 06 29 81 70 69

            Prendre rdv <span style={{ fontSize: '1rem' }}>↗</span>

          {/* Burger — mobile uniquement */}
          <button
            className="nav-burger"

// ─── TWEAKS ──────────────────────────────────────────────────────────────────
function Tweaks({ settings, setSettings }) {
  const [active, setActive] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setActive(true);
      if (e.data.type === '__deactivate_edit_mode') setActive(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (k, v) => {
    const next = { ...settings, [k]: v };
    setSettings(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  useEffect(() => {
    const root = document.documentElement;
    if (settings.palette === 'warm') {
      root.style.setProperty('--mea-orange', '#dd8142'); root.style.setProperty('--mea-orange-deep', '#b8632a');
      root.style.setProperty('--mea-cream', '#f4efe6'); root.style.setProperty('--mea-paper', '#eee7d8');
    } else if (settings.palette === 'bold') {
      root.style.setProperty('--mea-orange', '#ea6a20'); root.style.setProperty('--mea-orange-deep', '#b84a10');
      root.style.setProperty('--mea-cream', '#f2ede2'); root.style.setProperty('--mea-paper', '#e8e0cf');
    } else if (settings.palette === 'muted') {
      root.style.setProperty('--mea-orange', '#c88658'); root.style.setProperty('--mea-orange-deep', '#996a42');
      root.style.setProperty('--mea-cream', '#f6f3ec'); root.style.setProperty('--mea-paper', '#ede8dc');
    } else if (settings.palette === 'dark') {
      root.style.setProperty('--mea-orange', '#dd8142'); root.style.setProperty('--mea-orange-deep', '#e89050');
      root.style.setProperty('--mea-cream', '#1a1a1a'); root.style.setProperty('--mea-paper', '#242424');
      root.style.setProperty('--mea-dark', '#f0ede6'); root.style.setProperty('--mea-dark-2', '#d9d5cc');
      return () => { root.style.setProperty('--mea-dark', '#1c1c1c'); root.style.setProperty('--mea-dark-2', '#2d2d2d'); };
    }
    if (settings.palette !== 'dark') {
      root.style.setProperty('--mea-dark', '#1c1c1c'); root.style.setProperty('--mea-dark-2', '#2d2d2d');
    }
  }, [settings.palette]);

  useEffect(() => { document.body.dataset.density = settings.density; }, [settings.density]);

  if (!active) return null;

  return (
    <div className="tweak-panel">
      <h4>⚒ Tweaks</h4>
      <div className="tweak-row">
        <span>Palette</span>
        <div className="swatch-row">
          {[{ k: 'warm', c: '#dd8142' }, { k: 'bold', c: '#ea6a20' }, { k: 'muted', c: '#c88658' }, { k: 'dark', c: '#1a1a1a' }].map((s) => (
            <div key={s.k} onClick={() => update('palette', s.k)} className="swatch" style={{ background: s.c, outline: settings.palette === s.k ? '2px solid var(--mea-orange)' : 'none', outlineOffset: 2 }} title={s.k} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <span>Densité</span>
        <div className="seg">
          {['compact', 'default', 'cozy'].map((d) => <button key={d} onClick={() => update('density', d)} className={settings.density === d ? 'on' : ''}>{d[0]}</button>)}
        </div>
      </div>
      <div className="tweak-row">
        <span>Hero</span>
        <div className="seg">
          {[{ k: 'typographic', l: 'T' }, { k: 'hammerfocus', l: 'H' }, { k: 'statement', l: 'S' }].map((v) => (
            <button key={v.k} onClick={() => update('heroVariant', v.k)} className={settings.heroVariant === v.k ? 'on' : ''} title={v.k}>{v.l}</button>
          ))}
        </div>
      </div>
      <div style={{ marginTop: '0.8rem', paddingTop: '0.6rem', borderTop: '1px dashed var(--mea-dark)', fontSize: '0.62rem', color: 'var(--mea-gray)', textTransform: 'none', letterSpacing: 0 }}>Trois réglages sauvegardés dans le fichier</div>
    </div>
  );
}
