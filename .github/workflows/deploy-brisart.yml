name: Deploy mea-brisartculinaire

on:
  push:
    branches: [main]
    paths:
      - '_clients/artisans/brisart-culinaire/**'
      - '.github/workflows/deploy-brisart.yml'
  pull_request:
    branches: [main]
    paths:
      - '_clients/artisans/brisart-culinaire/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: _clients/artisans/brisart-culinaire

      - name: Build
        run: npm run build
        working-directory: _clients/artisans/brisart-culinaire

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _clients/artisans/brisart-culinaire/dist --project-name=mea-brisartculinaire --branch=${{ github.head_ref || github.ref_name }}
