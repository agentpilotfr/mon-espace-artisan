name: Deploy mon-espace-artisan

on:
  push:
    branches: [main]
    paths:
      - 'astro-site/**'
      - '.github/workflows/deploy-mea.yml'
  pull_request:
    branches: [main]
    paths:
      - 'astro-site/**'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: astro-site

      - name: Build
        run: npm run build
        working-directory: astro-site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro-site/dist --project-name=mon-espace-artisan --branch=${{ github.head_ref || github.ref_name }}
