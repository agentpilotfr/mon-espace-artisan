  <circle cx="44.12" cy="25"   r="5.8" fill="#E1B149"/>
  <circle cx="44.12" cy="39"   r="5.8" fill="#E1B149"/>
  <circle cx="32"    cy="46"   r="5.8" fill="#E1B149"/>
  <circle cx="19.88" cy="39"   r="5.8" fill="#E1B149"/>
